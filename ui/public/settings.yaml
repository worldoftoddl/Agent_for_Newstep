branding:
  appName: "ExcelBrief for Newsteps"
  logoPath: "/logo.png"
  logoWidth: 28
  logoHeight: 28
  description: "신입 회계사를 위한 감사조서(Excel) 해설 에이전트 — 조서를 읽고, 수행된 절차를 감사기준·K-IFRS 근거와 함께 설명합니다."
  fullDescription: "/full-description.md"

buttons:
  enableFileUpload: true
  chatInputPlaceholder: "조서나 감사기준에 대해 물어보세요. (예: 3650 조서는 어떤 절차를 위한 서식이야?)"

